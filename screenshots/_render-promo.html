<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  /* Forces the promo-tile SVG to render at exactly 440x280, no margins,
     no padding, no body whitespace. Open this in Chrome with viewport
     440x280, then DevTools > Capture screenshot. */
  html, body {
    margin: 0;
    padding: 0;
    background: #0B0B0E;
    width: 440px;
    height: 280px;
    overflow: hidden;
  }
  img {
    display: block;
    width: 440px;
    height: 280px;
  }
</style>
</head>
<body>
<img src="promo-tile.svg" alt="WalletGuard Pro">
</body>
</html>
