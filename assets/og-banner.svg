<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0d13;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1e29;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1e29;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b0d13;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff66;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00ff66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffcc;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#1a1e29" stroke-width="1" opacity="0.3">
    <line x1="0" y1="125" x2="1500" y2="125"/>
    <line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="375" x2="1500" y2="375"/>
    <line x1="375" y1="0" x2="375" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="1125" y1="0" x2="1125" y2="500"/>
  </g>
  <!-- Shield + W logo (stylized, scaled up to ~250px) -->
  <g transform="translate(120, 90)">
    <!-- Shield outline -->
    <path d="M 160 0 L 320 50 L 320 200 Q 320 290 160 340 Q 0 290 0 200 L 0 50 Z"
          fill="url(#shield)" stroke="#00ff66" stroke-width="3" opacity="0.95"/>
    <!-- Stylized W (scan line + diagonal) -->
    <g fill="#00ff66">
      <path d="M 60 90 L 90 90 L 105 220 L 130 110 L 155 220 L 180 90 L 210 90 L 175 280 L 150 280 L 130 200 L 110 280 L 85 280 Z" opacity="0.95"/>
      <!-- Scan line -->
      <rect x="40" y="260" width="240" height="4" rx="2" opacity="0.7"/>
    </g>
  </g>
  <!-- Headline -->
  <text x="500" y="195" font-family="Inter, -apple-system, sans-serif" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Stop signing blind.</text>
  <text x="500" y="270" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#8a92a3" letter-spacing="0.5">Free · Open-source · 9 chains · MIT</text>
  <!-- Stats badges -->
  <g transform="translate(500, 320)">
    <rect x="0" y="0" width="180" height="44" rx="22" fill="#12151d" stroke="#1a1e29"/>
    <text x="90" y="29" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#00ff66" text-anchor="middle">478 tests passing</text>
  </g>
  <g transform="translate(700, 320)">
    <rect x="0" y="0" width="170" height="44" rx="22" fill="#12151d" stroke="#1a1e29"/>
    <text x="85" y="29" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#00ffcc" text-anchor="middle">9 chains supported</text>
  </g>
  <g transform="translate(890, 320)">
    <rect x="0" y="0" width="160" height="44" rx="22" fill="#12151d" stroke="#1a1e29"/>
    <text x="80" y="29" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">MIT licensed</text>
  </g>
  <!-- Accent line at bottom -->
  <rect x="0" y="495" width="1500" height="5" fill="url(#accent)" opacity="0.7"/>
</svg>
