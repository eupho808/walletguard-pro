name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run all tests (Node 18+)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm install --omit=optional
        continue-on-error: true

      - name: Run all tests
        run: npm test

      - name: Verify bundles are syntactically valid
        run: |
          node --check content.js
          node --check popup-bundle.js
          node --check background.js
          node --check popup.js
          node --check injector.js
          node --check approval-scanner.js
          node --check settings.js

      - name: Verify ZIP packages are present
        run: |
          test -f walletguard-pro-v2.2.0.zip || (echo "Chrome ZIP missing" && exit 1)
          test -f walletguard-pro-firefox-v2.2.0.zip || (echo "Firefox ZIP missing" && exit 1)
          echo "Both ZIPs present"

      - name: Verify ZIPs don't contain dev files
        run: |
          if unzip -l walletguard-pro-v2.2.0.zip | grep -E '(test-|\.git/|node_modules/|\.zip$)'; then
            echo "ZIP contains dev files!" && exit 1
          fi
          echo "ZIP clean"
