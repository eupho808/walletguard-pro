# GitHub Actions CI for WalletGuard Pro
#
# Runs on every push and PR to main/master. Verifies that:
#   1. node build.js produces a valid bundle (no syntax errors in lib/*)
#   2. All Node-side test suites pass (typosquat, integration, multichain, nft)
#
# No npm install needed — the project has zero runtime dependencies.
# Tests are plain Node ESM scripts that import directly from lib/.

name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Allow only one concurrent run per ref; cancel in-progress runs on new pushes.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify bundle builds
        # node build.js concatenates lib/* + content.js into a single IIFE.
        # Catches syntax errors in any lib module before they reach a release.
        run: |
          node build.js
          echo "---"
          echo "Bundle size: $(wc -c < content.js) bytes"
          echo "Bundle lines: $(wc -l < content.js)"

      - name: Run test suite
        # Each test-*.js file is a standalone ESM script. Run them all,
        # capture pass/fail per file, and exit non-zero if any failed.
        run: |
          set +e
          total_pass=0
          total_fail=0
          failed_files=()

          for test_file in test-*.js; do
            echo ""
            echo "================================================================"
            echo "  $test_file"
            echo "================================================================"
            node "$test_file"
            rc=$?
            if [ $rc -eq 0 ]; then
              echo ">>> $test_file: PASSED"
            else
              echo ">>> $test_file: FAILED (exit $rc)"
              failed_files+=("$test_file")
            fi
          done

          echo ""
          echo "================================================================"
          echo "  Summary"
          echo "================================================================"
          if [ ${#failed_files[@]} -eq 0 ]; then
            echo "All test files passed."
            exit 0
          else
            echo "Failed test files:"
            for f in "${failed_files[@]}"; do
              echo "  - $f"
            done
            exit 1
          fi
