name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Verify bundle integrity
        run: |
          node --check content.js
          node --check popup.js
          node --check background.js
          node --check settings.js
          node --check injector.js

      - name: Run full test suite
        run: npm test

      - name: Verify ZIP packages
        run: |
          test -f walletguard-pro-v3.7.0.zip || echo "Chrome ZIP not built (run build-chrome-pack.js locally)"
          test -f walletguard-pro-firefox-v3.7.0.zip || echo "Firefox ZIP not built (run build-firefox-pack.js locally)"
